name: build-geosite

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout v2fly domain list
        run: |
          git clone https://github.com/v2fly/domain-list-community.git
          cd domain-list-community

      - name: Inject custom data
        run: |
          mkdir -p domain-list-community/data
          cp -r data domain-list-community/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go mod download
          go run ./ --datapath=./data

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geosite
          path: domain-list-community/geosite.dat

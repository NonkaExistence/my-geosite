name: build-geosite

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем ТВОЙ репозиторий
      - name: Checkout current repo
        uses: actions/checkout@v4

      # 2. Устанавливаем Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 3. Клонируем официальный v2fly repo
      - name: Clone domain-list-community
        run: |
          git clone https://github.com/v2fly/domain-list-community.git

      # 4. Копируем ТВОЙ список
      - name: Inject custom data
        run: |
          cp data/mywhitelist domain-list-community/data/mywhitelist

      # 5. Собираем geosite.dat
      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go mod download
          go run ./ --datapath=./data

      # 6. Копируем результат обратно
      - name: Copy result
        run: |
          cp domain-list-community/geosite.dat ./geosite.dat

      # 7. Загружаем artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geosite
          path: geosite.dat

      # 8. Коммитим geosite.dat обратно в repo
      - name: Commit geosite.dat
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add geosite.dat
          git commit -m "update geosite.dat" || exit 0
          git push

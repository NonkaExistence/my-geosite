name: build-geosite

on:
  push:
    paths:
      - 'data/mywhitelist'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # 3. Clone v2fly domain-list-community
      - name: Clone domain-list-community
        run: |
          git clone https://github.com/v2fly/domain-list-community.git

      # 4. Prepare data directory (ВАЖНО)
      - name: Inject custom data
        run: |
          mkdir -p domain-list-community/data
          cp data/mywhitelist domain-list-community/data/mywhitelist

      # 5. Build geosite.dat
      - name: Build geosite.dat
        run: |
          cd domain-list-community
          go mod download
          go run ./ --datapath=./data

      # 6. Copy result
      - name: Copy result
        run: |
          cp domain-list-community/dlc.dat ./geosite.dat

      # 7. Generate TXT version (без domain:)
      - name: Generate TXT version
        run: |
          mkdir -p output
          sed 's/domain://g' data/mywhitelist > output/mywhitelist.txt

      # 8. Commit results
      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add geosite.dat output/mywhitelist.txt
          git commit -m "update geosite + txt" || exit 0
          git push
